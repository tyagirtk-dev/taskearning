<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>body{margin:0;padding:0;background:#f1f5f9;font-family:Arial,sans-serif;color:#1e293b}.wrapper{max-width:540px;margin:40px auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.08)}.header{background:linear-gradient(135deg,#dc2626,#ef4444);padding:32px;text-align:center}.body{padding:32px}.footer{background:#f8fafc;padding:20px 32px;text-align:center;color:#94a3b8;font-size:12px}.otp-box{background:#fee2e2;border:2px dashed #fca5a5;border-radius:12px;padding:20px;text-align:center;margin:20px 0}.otp-code{font-size:40px;font-weight:800;color:#dc2626;letter-spacing:8px}</style>
</head>
<body>
<div class="wrapper">
  <div class="header"><h1 style="margin:0;color:#fff;font-size:22px;font-weight:700">🔐 Password Reset</h1></div>
  <div class="body">
    <p>Hi <strong>{{ user.name }}</strong>,</p>
    <p>We received a request to reset your password. Use the code below:</p>
    <div class="otp-box">
      <p style="margin:0 0 8px;color:#64748b;font-size:13px">Reset OTP</p>
      <div class="otp-code">{{ otp }}</div>
      <p style="margin:8px 0 0;color:#94a3b8;font-size:12px">Expires in 30 minutes</p>
    </div>
    <p style="color:#64748b;font-size:13px">If you didn't request a reset, please ignore this email. Your password will not change.</p>
  </div>
  <div class="footer">© TaskEarner &nbsp;·&nbsp; Do not reply to this email</div>
</div>
</body></html>
